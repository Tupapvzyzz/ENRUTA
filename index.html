<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENRUTA</title>
  <link rel="stylesheet" href="enruta.css" />
</head>
<body>

  <main class="app">

    <section id="pantallaInicio" class="screen active hero">
      <div class="overlay"></div>

      <div class="hero-content">
        <img src="assets/splash-enruta.png" alt="ENRUTA" class="hero-img">

        <h1>ENRUTA</h1>
        <p>Entregas urbanas rápidas en moto</p>

        <button onclick="mostrarPantalla('pantallaRol')" class="btn primary">
          Empezar
        </button>
      </div>
    </section>

    <section id="pantallaRol" class="screen">
      <h2>¿Cómo quieres ingresar?</h2>

      <div class="cards">
        <button class="card" onclick="seleccionarRol('cliente')">
          <h3>Cliente</h3>
          <p>Publica tu pedido y elige un repartidor.</p>
        </button>

        <button class="card" onclick="seleccionarRol('repartidor')">
          <h3>Repartidor</h3>
          <p>Recibe pedidos y genera ingresos en moto.</p>
        </button>
      </div>
    </section>

    <section id="pantallaRegistro" class="screen">
      <h2 id="tituloRegistro">Registro</h2>

      <div class="steps">
        <span class="step active">1</span>
        <span class="step">2</span>
        <span class="step">3</span>
      </div>

      <form id="formRegistro">
        <input id="nombre" type="text" placeholder="Nombre completo" required>
        <input id="telefono" type="tel" placeholder="Número de celular" required>
        <input id="dni" type="text" placeholder="DNI" required>

        <div id="camposRepartidor" class="hidden">
          <input id="placa" type="text" placeholder="Placa de moto">
          <input id="soat" type="text" placeholder="Número de SOAT">
          <input id="licencia" type="text" placeholder="Licencia de conducir">
        </div>

        <button class="btn primary" type="submit">
          Continuar a verificación
        </button>
      </form>
    </section>

    <section id="pantallaVerificacion" class="screen">
      <h2>Verificación</h2>

      <div class="steps">
        <span class="step done">1</span>
        <span class="step active">2</span>
        <span class="step">3</span>
      </div>

      <div class="verify-box">
        <p id="textoVerificacion"></p>

        <label class="upload">
          Foto de DNI
          <input type="file">
        </label>

        <label id="uploadMoto" class="upload hidden">
          Foto de moto / SOAT
          <input type="file">
        </label>

        <button onclick="finalizarVerificacion()" class="btn primary">
          Verificar
        </button>
      </div>
    </section>

    <section id="pantallaListo" class="screen">
      <h2>Todo listo</h2>

      <div class="steps">
        <span class="step done">1</span>
        <span class="step done">2</span>
        <span class="step active">3</span>
      </div>

      <p id="mensajeListo"></p>

      <button onclick="entrarPanel()" class="btn primary">
        Entrar
      </button>
    </section>

    <section id="panelCliente" class="screen">
      <header class="topbar">
        <h2>Cliente</h2>
        <button onclick="cerrarSesion()">Salir</button>
      </header>

      <div class="box">
        <h3>Solicitar envío</h3>

        <input id="origen" type="text" placeholder="Punto de recojo">
        <input id="destino" type="text" placeholder="Destino">
        <input id="distancia" type="number" placeholder="Distancia en km">

        <button onclick="calcularPrecio()" class="btn secondary">
          Calcular precio
        </button>

        <div id="resultadoPrecio" class="price hidden"></div>

        <button onclick="publicarPedido()" class="btn primary">
          Rutear
        </button>
      </div>

      <div class="box">
        <h3>Mis pedidos publicados</h3>
        <div id="listaPedidosCliente"></div>
      </div>
    </section>

    <section id="panelRepartidor" class="screen">
      <header class="topbar">
        <h2>Repartidor</h2>
        <button onclick="cerrarSesion()">Salir</button>
      </header>

      <div class="box">
        <h3>Pedidos disponibles</h3>
        <div id="listaPedidosRepartidor"></div>
      </div>

      <div class="box">
        <h3>Mis ganancias</h3>
        <p id="ganancias">S/ 0.00</p>
      </div>
    </section>

  </main>

  <script src="enruta.js"></script>
</body>
</html>
